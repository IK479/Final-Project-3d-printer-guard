<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aegis Print Guard | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1326] text-[#dae2fd] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-[#171f33] border border-[#3c4a42] rounded-xl p-8 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-[#10b981]/10 rounded-xl mx-auto flex items-center justify-center border border-[#10b981]/20">
                <span class="material-symbols-outlined text-[#4edea3] text-2xl">shield</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-[#4edea3]">Aegis Print Guard</h1>
            <p class="text-xs text-[#bbcabf] font-mono">Secure Access Authorization Hub</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Username</label>
                <input id="username" type="text" required class="w-full bg-[#0b1326] border border-[#3c4a42] rounded p-3 text-sm focus:outline-none focus:border-[#4edea3] transition-colors text-white"/>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Password</label>
                <input id="password" type="password" required class="w-full bg-[#0b1326] border border-[#3c4a42] rounded p-3 text-sm focus:outline-none focus:border-[#4edea3] transition-colors text-white"/>
            </div>
            <div id="error-msg" class="text-xs text-red-400 font-mono hidden text-center"></div>
            
            <button type="submit" class="w-full py-3 bg-[#10b981] text-[#002113] font-bold rounded-lg hover:brightness-110 transition-all active:scale-[0.98] font-mono tracking-wide mt-2">
                AUTHENTICATE
            </button>
        </form>
        <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Dont have an Account?</label>
                <button type="submit" onclick="window.location.href='/register'" class="p-2 text-on-surface-variant hover:bg-surface-variant transition-colors rounded active:scale-95 duration-100">register</button>
            </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Saving the Token in the browser to switch between pages
                    sessionStorage.setItem('aegis_token', data.token);
                    sessionStorage.setItem('aegis_user', document.getElementById('username').value);
                    window.location.href = '/'; // Go to the main page
                } else {
                    errorMsg.innerText = "❌ " + (data.detail || "Authentication Failed");
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "❌ Connection server error";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
