<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aegis Print Guard | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1326] text-[#dae2fd] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-[#171f33] border border-[#3c4a42] rounded-xl p-8 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-[#10b981]/10 rounded-xl mx-auto flex items-center justify-center border border-[#10b981]/20">
                <span class="material-symbols-outlined text-[#4edea3] text-2xl">person_add</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-[#4edea3]">Create Account</h1>
            <p class="text-xs text-[#bbcabf] font-mono">Register New System Operator</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Username</label>
                <input id="username" type="text" required class="w-full bg-[#0b1326] border border-[#3c4a42] rounded p-3 text-sm focus:outline-none focus:border-[#4edea3] transition-colors text-white"/>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Password</label>
                <input id="password" type="password" required class="w-full bg-[#0b1326] border border-[#3c4a42] rounded p-3 text-sm focus:outline-none focus:border-[#4edea3] transition-colors text-white"/>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-mono text-[#bbcabf] uppercase tracking-wider">Confirm Password</label>
                <input id="confirm-password" type="password" required class="w-full bg-[#0b1326] border border-[#3c4a42] rounded p-3 text-sm focus:outline-none focus:border-[#4edea3] transition-colors text-white"/>
            </div>

            <div id="message-msg" class="text-xs font-mono hidden text-center py-1"></div>
            
            <button type="submit" class="w-full py-3 bg-[#10b981] text-[#002113] font-bold rounded-lg hover:brightness-110 transition-all active:scale-[0.98] font-mono tracking-wide mt-2">
                CREATE OPERATOR
            </button>
        </form>

        <div class="text-center pt-2 border-t border-[#3c4a42]/30">
            <a href="/login" class="text-xs text-[#4edea3] hover:underline font-mono">← Back to Login Hub</a>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('message-msg');
            msgEl.classList.add('hidden');

            const username = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Client-side password matching check
            if (password !== confirmPassword) {
                msgEl.innerText = "❌ Passwords do not match";
                msgEl.className = "text-xs font-mono text-red-400 text-center block";
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: role
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    msgEl.innerText = "✅ Registration successful! Redirecting...";
                    msgEl.className = "text-xs font-mono text-[#4edea3] text-center block";
                    
                    // Automatically go to the login page after 2 seconds so the user has time to see that they were successful
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    msgEl.innerText = "❌ " + (data.detail || "Registration Failed");
                    msgEl.className = "text-xs font-mono text-red-400 text-center block";
                }
            } catch (err) {
                msgEl.innerText = "❌ Connection server error";
                msgEl.className = "text-xs font-mono text-red-400 text-center block";
            }
        });
    </script>
</body>
</html>
